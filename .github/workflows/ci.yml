name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Start Supabase
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Seed database
        run: psql postgresql://postgres:postgres@127.0.0.1:54322/postgres -f supabase/seed.sql

      - name: Extract Supabase keys
        id: supabase
        run: |
          echo "SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')" >> "$GITHUB_OUTPUT"
          echo "SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> "$GITHUB_OUTPUT"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_OUTPUT"

      - name: Verify auth
        run: |
          echo "Testing sign-in..."
          curl -sf -X POST ${{ steps.supabase.outputs.SUPABASE_URL }}/auth/v1/token?grant_type=password \
            -H "apikey: ${{ steps.supabase.outputs.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"email":"test@typenote.dev","password":"Test1234"}' | jq .access_token

      - name: Integration tests
        run: pnpm test:integration
        env:
          SUPABASE_URL: ${{ steps.supabase.outputs.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build
        run: pnpm build
