name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Start Supabase
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Wait for Supabase health
        run: |
          echo "Waiting for GoTrue (auth) to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:54321/auth/v1/health > /dev/null 2>&1; then
              echo "GoTrue is ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:54321/auth/v1/health || (echo "GoTrue failed to start" && exit 1)

      - name: Seed database
        run: psql postgresql://postgres:postgres@127.0.0.1:54322/postgres -f supabase/seed.sql

      - name: Verify auth works
        run: |
          curl -sf http://127.0.0.1:54321/auth/v1/health
          echo ""
          curl -s -X POST http://127.0.0.1:54321/auth/v1/token?grant_type=password \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"email":"test@typenote.dev","password":"Test1234"}' | head -c 200
          echo ""

      - name: Integration tests
        run: pnpm test:integration
        env:
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

      - name: Build
        run: pnpm build
