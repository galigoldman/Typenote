name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  ci:
    # Pinned to ubuntu-22.04 (Jammy) so visual regression baselines stay deterministic.
    # Playwright snapshots are pixel-sensitive to OS / font versions — see e2e/TEST_REGISTRY.md.
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      # Install the Supabase CLI directly. We don't use supabase/setup-cli@v1
      # because it builds download URLs without the version in the filename
      # (e.g. `supabase_linux_amd64.tar.gz`) which 404s — Supabase publishes
      # asset names *with* the version embedded (`supabase_2.99.0_linux_amd64.tar.gz`).
      # The action's broken URL pattern affects both @v1 and @v2 tags.
      - name: Install Supabase CLI
        env:
          # Pinned to v2.98.2 — the last known-good version per the last
          # green CI run on main (2026-05-15). v2.99.0 (released 2026-05-18)
          # both changed the asset naming convention AND causes
          # `supabase start` to hang indefinitely on CI runners.
          SUPABASE_VERSION: 2.98.2
        run: |
          # v2.98.2 publishes the versionless filename `supabase_<platform>_<arch>.tar.gz`.
          # (v2.99.0 switched to the versioned form `supabase_<version>_<platform>_<arch>.tar.gz`
          # — and broke the official setup-cli action in the process.)
          curl -fsSL "https://github.com/supabase/cli/releases/download/v${SUPABASE_VERSION}/supabase_linux_amd64.tar.gz" -o /tmp/supabase.tar.gz
          tar -xzf /tmp/supabase.tar.gz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/
          supabase --version
          # setup-cli sets this so `supabase start` pulls Docker images
          # from ghcr.io instead of Docker Hub. Preserve that behavior.
          echo "SUPABASE_INTERNAL_IMAGE_REGISTRY=ghcr.io" >> "$GITHUB_ENV"

      - name: Start Supabase local
        run: supabase start

      - name: Seed database
        run: psql postgresql://postgres:postgres@127.0.0.1:54322/postgres -f supabase/seed.sql

      - name: Extract Supabase keys
        id: supabase
        run: |
          echo "SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')" >> "$GITHUB_OUTPUT"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_OUTPUT"
          echo "SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> "$GITHUB_OUTPUT"

      - name: Integration tests
        run: pnpm test:integration
        env:
          SUPABASE_URL: ${{ steps.supabase.outputs.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build extension
        run: cd extension && npm install && npm run build

      - name: E2E tests
        run: pnpm test:e2e
        env:
          TEST_USER_EMAIL: test@typenote.dev
          TEST_USER_PASSWORD: Test1234
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.SUPABASE_ANON_KEY }}
          # The Next.js dev server (started by Playwright) calls
          # createAdminClient() in server components (e.g. courses page) and
          # in API routes. Forward the service-role key so SSR doesn't
          # throw "Missing SUPABASE_SERVICE_ROLE_KEY" during E2E runs.
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.SUPABASE_SERVICE_ROLE_KEY }}
          # Pinned ID matches the "key" in extension/manifest.json — lets the
          # dashboard recognize the unpacked extension loaded by extension-real.spec.ts.
          NEXT_PUBLIC_EXTENSION_ID: beajdnpmcbgjfkhojoangknkeimimmfm

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Auto-deploy main pushes to Vercel production.
  # The Vercel GitHub App is not installed on the galigoldman account, so we
  # cannot use Vercel's native Git integration. Instead we invoke the Vercel
  # CLI directly with a token + project IDs stored as repo secrets. Runs only
  # on the post-merge push to main and only if `ci` is green.
  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@51

      - name: Pull Vercel production env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build production bundle
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt artifacts to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
