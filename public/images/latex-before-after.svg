  <text x="180" y="24" text-anchor="middle" font-family="serif" font-size="11" fill="#3b82f6">result</text>
  <text x="180" y="48" text-anchor="middle" font-family="serif" font-style="italic" font-size="16" fill="#18181b">x² + y² = r²</text>
